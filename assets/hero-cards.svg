<svg width="920" height="520" viewBox="0 0 920 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="0" x2="860" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#FDF2F8"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="280" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE4E6"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="300" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="340" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="100%" height="100%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="120" cy="88" r="62" fill="#FCE7F3"/>
  <circle cx="798" cy="90" r="74" fill="#E0E7FF"/>
  <circle cx="820" cy="430" r="86" fill="#DBEAFE"/>

  <g filter="url(#shadow)">
    <rect x="84" y="178" width="292" height="208" rx="20" fill="url(#cardA)"/>
    <rect x="314" y="112" width="292" height="208" rx="20" fill="url(#cardB)"/>
    <rect x="540" y="182" width="292" height="208" rx="20" fill="url(#cardC)"/>
  </g>

  <text x="126" y="238" fill="#7C3AED" font-size="18" font-family="Nunito, sans-serif" font-weight="800">BIRTHDAY</text>
  <text x="126" y="282" fill="#0F172A" font-size="40" font-family="Baloo 2, Nunito, sans-serif" font-weight="700">Celebrate</text>

  <text x="356" y="172" fill="#0EA5E9" font-size="18" font-family="Nunito, sans-serif" font-weight="800">THANK YOU</text>
  <text x="356" y="216" fill="#0F172A" font-size="40" font-family="Baloo 2, Nunito, sans-serif" font-weight="700">Appreciate</text>

  <text x="582" y="242" fill="#6366F1" font-size="18" font-family="Nunito, sans-serif" font-weight="800">CONGRATS</text>
  <text x="582" y="286" fill="#0F172A" font-size="40" font-family="Baloo 2, Nunito, sans-serif" font-weight="700">Shine</text>
